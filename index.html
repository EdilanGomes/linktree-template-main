<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Hyena Imports | Preços que não te mordem</title>

    <link href="assets/css/style.css" rel="stylesheet">
    <link rel="icon" href="assets/images/logo.png" type="image/webp">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Canvas background -->
    <canvas id="bg-canvas" class="background-overlay"></canvas>

    <div class="min-h-full flex-h-center">

        <div class="mt-48 page-full-wrap relative">

            <!-- Logo -->
            <img class="display-image m-auto" src="assets/images/logo.png"/>

            <!-- Título -->
            <h2 class="page-title text-center">
                Hyena Imports <br>
                Preços que não te mordem
            </h2>

            <!-- Subtexto (CONVERSÃO) -->
            <p style="text-align:center; margin-top:10px; opacity:0.8;">
                Produtos da China com preço de importadora, à pronta entrega no Brasil
            </p>

            <div class="mt-24">

                <!-- BOTÃO PRINCIPAL -->
                <div class="page-item-wrap">
                    <a target="_blank" class="page-item-each py-10 flex-both-center"
                       href="https://shopee.com.br/hyenaimports"
                       style="font-weight:600;">
                        <span class="item-title text-center">
                            🛒 Comprar na Shopee
                        </span>
                    </a>
                </div>

                <!-- WhatsApp -->
                <div class="page-item-wrap">
                    <a target="_blank" class="page-item-each py-10 flex-both-center"
                       href="https://wa.me/5547920014973?text=Olá! Quero tirar dúvidas">
                        <span class="item-title text-center">
                            💬 Falar no WhatsApp
                        </span>
                    </a>
                </div>

                <!-- Instagram -->
                <div class="page-item-wrap">
                    <a target="_blank" class="page-item-each py-10 flex-both-center"
                       href="https://www.instagram.com/hyena_imports">
                        <span class="item-title text-center">
                            📸 Instagram
                        </span>
                    </a>
                </div>

                <!-- Google -->
                <div class="page-item-wrap">
                    <a target="_blank" class="page-item-each py-10 flex-both-center"
                       href="https://g.page/r/CdgXIKWuqlgoEBM/review">
                        <span class="item-title text-center">
                            ⭐ Avaliar no Google
                        </span>
                    </a>
                </div>

            </div>
        </div>
    </div>

    <!-- SCRIPT HYENA BACKGROUND -->
    <script>
    (() => {
        const canvas = document.getElementById("bg-canvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        const hyenaImg = new Image();
        hyenaImg.src = "assets/images/cabeca.png";

        const PARTICLE_COUNT = 60;
        let particles = [];

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 20 + 10,
                speedY: Math.random() * 1 + 0.5,
                speedX: Math.random() * 1 - 0.5,
                opacity: Math.random() * 0.1 + 0.05
            };
        }

        function init() {
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(createParticle());
            }
        }

        function update() {
            particles.forEach(p => {
                p.y += p.speedY;
                p.x += p.speedX;

                if (p.y > canvas.height) {
                    p.y = -20;
                    p.x = Math.random() * canvas.width;
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                ctx.globalAlpha = p.opacity;
                ctx.drawImage(hyenaImg, p.x, p.y, p.size, p.size);
            });

            ctx.globalAlpha = 1;
        }

        function animate() {
            update();
            draw();
            requestAnimationFrame(animate);
        }

        hyenaImg.onload = () => {
            init();
            animate();
        };
    })();
    </script>

</body>
</html>
