<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link href="assets/css/style.css" rel="stylesheet">
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0'>
    <link rel="shortcut icon" href="assets/images/logo.png" type="image/webp">
    <link rel="apple-touch-icon" sizes="180x180" href="images/logo.png">
    <link rel="icon" href="assets/images/logo.png" type="image/webp">
    <title>Hyena Imports | Preços que não te mordem | Distribuidora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Background -->
    <section class="animated-background">
        <div id="stars1"></div>
        <div id="stars2"></div>
        <div id="stars3"></div>
    </section>

    <div class="min-h-full flex-h-center" id="background_div">

        <canvas id="bg-canvas" class="background-overlay"></canvas>

        <div class="mt-48 page-full-wrap relative ">
            <input type="hidden" value="creator-page" id="page-type">

            <img class="display-image m-auto" src="assets/images/logo.png"/>

            <h2 class="page-title page-text-color page-text-font mt-16 text-center">
                Hyena Imports <br> Preços que não te mordem
            </h2>

            <div class="mt-24">

                <!-- Shopee -->
                <div class="page-item-wrap relative">
                    <div class="page-item flex-both-center absolute"></div>
                    <a target="_blank" class="page-item-each py-10 flex-both-center"
                       href="https://shopee.com.br/hyenaimports">
                        <img class="link-each-image" src="assets/images/shopee.png"/>
                        <span class="item-title text-center">Compre pela Shopee</span>
                    </a>
                </div>

                <!-- WhatsApp -->
                <div class="page-item-wrap relative">
                    <div class="page-item flex-both-center absolute"></div>
                    <a target="_blank" class="page-item-each py-10 flex-both-center"
                       href="https://wa.me/5547920014973?text=Olá! Quero tirar dúvidas">
                        <img class="link-each-image" src="assets/images/whatsapp.png"/>
                        <span class="item-title text-center">Falar com comercial</span>
                    </a>
                </div>

                <!-- Instagram -->
                <div class="page-item-wrap relative">
                    <div class="page-item flex-both-center absolute"></div>
                    <a target="_blank" class="page-item-each py-10 flex-both-center"
                       href="https://www.instagram.com/hyena_imports">
                        <img class="link-each-image" src="assets/images/instagram.png"/>
                        <span class="item-title text-center">Siga no Instagram</span>
                    </a>
                </div>

                <!-- Google -->
                <div class="page-item-wrap relative">
                    <div class="page-item flex-both-center absolute"></div>
                    <a target="_blank" class="page-item-each py-10 flex-both-center"
                       href="https://g.page/r/CdgXIKWuqlgoEBM/review">
                        <img class="link-each-image" src="assets/images/google.png"/>
                        <span class="item-title text-center">Avalie no Google</span>
                    </a>
                </div>

            </div>
        </div>
    </div>

    <!-- SCRIPT HYENA (EFEITO NEVE COM LOGO) -->
    <script>
    (() => {
        const canvas = document.getElementById("bg-canvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }

        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        const img = new Image();
        img.src = "assets/images/cabeca.png";

        const PARTICLES = 60;
        let particles = [];

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 18 + 8,
                speedY: Math.random() * 1 + 0.5,
                speedX: Math.random() * 0.5 - 0.25,
                opacity: Math.random() * 0.08 + 0.04
            };
        }

        function init() {
            particles = [];
            for (let i = 0; i < PARTICLES; i++) {
                particles.push(createParticle());
            }
        }

        function update() {
            particles.forEach(p => {
                p.y += p.speedY;
                p.x += p.speedX;

                if (p.y > canvas.height) {
                    p.y = -20;
                    p.x = Math.random() * canvas.width;
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                ctx.globalAlpha = p.opacity;
                ctx.drawImage(img, p.x, p.y, p.size, p.size);
            });

            ctx.globalAlpha = 1;
        }

        function animate() {
            update();
            draw();
            requestAnimationFrame(animate);
        }

        img.onload = () => {
            init();
            animate();
        };
    })();
    </script>

</body>
</html>
